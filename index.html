*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {

body {

.logo {

}

.thumb {

  max-width: 22rem;

.thumb-container {

}

@keyframes shimmer {

  100% { background-position: 200% center; }

  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.4); }
