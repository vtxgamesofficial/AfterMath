<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATLAS – Avatar Catalog</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

html {
  background: #000;
  background-image: linear-gradient(to top right, #2563eb33, transparent, #ffffff18);
  background-attachment: fixed;
}

body {
  font-family: 'Inter', sans-serif;
  color: #fff;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 1rem;
}

.intro-text {
  font-size: 1.1rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0;
  animation: fade 0.8s forwards;
}

.intro-logo {
  height: 4rem;
  opacity: 0;
  animation: fade 0.8s forwards;
}

@keyframes fade { to { opacity: 1; } }

.fade-out { animation: fadeOut 0.8s forwards; }
@keyframes fadeOut { to { opacity:0; transform:scale(1.1);} }

/* PAGE */
.page {
  max-width: 22rem;
  margin: auto;
  padding: 6rem 1.2rem;
  display:flex;
  flex-direction:column;
  gap:1.2rem;
  text-align:center;
}

/* LOGO */
.logo {
  height: 4rem;
  object-fit: contain;
}

/* THUMB */
.thumb {
  width:100%;
  border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* BUTTON */
.play-btn {
  padding:1rem;
  border-radius:999px;
  background:#fff;
  color:#000;
  font-weight:700;
  text-decoration:none;
  transition:0.2s;
}
.play-btn:hover { transform:scale(1.05); }

/* FEATURES */
.feature {
  font-size:0.85rem;
  opacity:0.6;
}

/* DIVIDER */
.divider {
  height:1px;
  background:rgba(255,255,255,0.1);
}

/* LEADERBOARD */
.leaderboard {
  display:flex;
  flex-direction:column;
  gap:0.5rem;
}
.lb-item {
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,0.05);
  padding:0.6rem;
  border-radius:8px;
  font-size:0.8rem;
}

/* FOOTER */
.footer {
  font-size:0.75rem;
  opacity:0.5;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro"></div>

<!-- MAIN -->
<div id="root" style="display:none;">
  <main class="page">

    <img src="atlas-logo.png" class="logo" alt="ATLAS">

    <img class="thumb" src="https://tr.rbxcdn.com/180DAY-a831d06738e05a3806082be371769372/768/432/Image/Webp/noFilter">

    <a href="https://www.roblox.com/games/117028046402506" class="play-btn" target="_blank">
      🎮 Play ATLAS Catalog
    </a>

    <div class="divider"></div>

    <div class="feature">🛍️ Try any avatar item</div>
    <div class="feature">👕 Create outfits</div>
    <div class="feature">💸 Buy instantly</div>

    <div class="divider"></div>

    <!-- LEADERBOARD -->
    <div>
      <p style="font-size:0.7rem; letter-spacing:0.1em; opacity:0.4;">TOP PARTNERS</p>
      <div class="leaderboard">
        <div class="lb-item"><span>🥇 kcy x ATLAS</span><span>#1</span></div>
        <div class="lb-item"><span>🥈 Auveity x ATLAS</span><span>#2</span></div>
        <div class="lb-item"><span>jujusdesk x ATLAS</span><span>-</span></div>
        <div class="lb-item"><span>Fiori' x ATLAS</span><span>-</span></div>
      </div>
    </div>

    <div class="divider"></div>

    <p class="footer">
      ATLAS © 2026 — Made by <strong>Eight25bro</strong>
    </p>

  </main>
</div>

<!-- INTRO SCRIPT -->
<script>
const intro = document.getElementById("intro");
const root = document.getElementById("root");

const lines = [
  { type: "text", value: "FitHub" },
  { type: "text", value: "was the beginning" },
  { type: "text", value: "Welcome to" },
  { type: "logo" }
];

let i = 0;

function next() {
  if (i >= lines.length) {
    intro.classList.add("fade-out");
    setTimeout(() => {
      intro.remove();
      root.style.display = "block";
    }, 800);
    return;
  }

  const item = lines[i];

  if (item.type === "logo") {
    intro.innerHTML = `<img src="atlas-logo.png" class="intro-logo">`;
  } else {
    intro.innerHTML = `<div class="intro-text">${item.value}</div>`;
  }

  i++;
  setTimeout(next, 900);
}

next();
</script>

</body>
</html>
