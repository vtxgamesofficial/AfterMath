<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATLAS – Avatar Catalog Engine</title>

<meta name="description" content="ATLAS is a next-generation Roblox catalog engine. Try any avatar item, build outfits, and purchase instantly.">
<meta name="author" content="ATLAS Studios">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* 🔥 INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.intro-text {
  font-size: 1.4rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeText 0.8s forwards;
}

@keyframes fadeText {
  to { opacity: 1; }
}

.fade-out {
  animation: fadeOut 0.8s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; transform: scale(1.1); }
}

/* 🔥 MAIN PAGE */
.page {
  max-width: 22rem;
  margin: auto;
  padding: 6rem 1.2rem;
  text-align: center;
}

.logo {
  height: 4rem;
  margin-bottom: 1rem;
}

.thumb {
  width: 100%;
  border-radius: 12px;
  margin: 1rem 0;
}

.play-btn {
  display: block;
  margin: 1rem 0;
  padding: 1rem;
  border-radius: 999px;
  background: #fff;
  color: #000;
  font-weight: 700;
  text-decoration: none;
  transition: 0.2s;
}
.play-btn:hover {
  transform: scale(1.05);
}

.info-text {
  opacity: 0.7;
  font-size: 0.9rem;
}

.feature {
  margin: 0.6rem 0;
  opacity: 0.6;
}

.divider {
  height: 1px;
  background: #222;
  margin: 1.5rem 0;
}

.small {
  font-size: 0.75rem;
  opacity: 0.4;
}
</style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro"></div>

<!-- 🔥 MAIN -->
<div id="root" style="display:none;">
  <main class="page">

    <h1 style="font-size:1.2rem; letter-spacing:0.2em;">ATLAS</h1>
    <p class="info-text">Built by <strong>ATLAS Studios</strong></p>

    <img class="thumb" src="https://tr.rbxcdn.com/180DAY-a831d06738e05a3806082be371769372/768/432/Image/Webp/noFilter">

    <a href="https://www.roblox.com/games/117028046402506" class="play-btn" target="_blank">
      🚀 Launch ATLAS Engine
    </a>

    <div class="divider"></div>

    <div class="feature">🧠 Full avatar catalog access</div>
    <div class="feature">🎯 Build outfits in real-time</div>
    <div class="feature">⚡ Instant purchase system</div>

    <div class="divider"></div>

    <p class="small">
      ATLAS © 2026 — A product by ATLAS Studios
    </p>

  </main>
</div>

<!-- 🔥 INTRO SCRIPT -->
<script>
const intro = document.getElementById("intro");
const root = document.getElementById("root");

const lines = [
  "FitHub",
  "was the beginning",
  "Welcome to",
  "ATLAS"
];

let i = 0;

function nextLine() {
  if (i >= lines.length) {
    intro.classList.add("fade-out");

    setTimeout(() => {
      intro.remove();
      root.style.display = "block";
    }, 800);

    return;
  }

  intro.innerHTML = `<div class="intro-text">${lines[i]}</div>`;
  i++;

  setTimeout(nextLine, 900);
}

nextLine();
</script>

</body>
</html>
